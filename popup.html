<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 260px;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #09090b;
            color: #fafafa;
            margin: 0;
            overflow: hidden;
        }

        .container {
            padding: 24px;
            background: linear-gradient(180deg, rgba(30, 58, 138, 0.2) 0%, rgba(9, 9, 11, 0) 100%);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        h3 {
            font-size: 16px;
            margin: 0;
            color: #f8fafc;
            letter-spacing: 0.5px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 12px;
        }

        #startBtn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
        }

        #startBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }

        #stopBtn {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: none;
        }

        #stopBtn:hover {
            background: #ef4444;
            color: white;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(156, 163, 175, 0.1);
            color: #9ca3af;
            margin-bottom: 16px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .footer {
            margin-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 16px;
        }

        .perm-link {
            color: #3b82f6;
            font-size: 11px;
            text-decoration: none;
            opacity: 0.7;
            transition: 0.2s;
        }

        .perm-link:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo">S</div>
            <h3>SENSOR DUCH</h3>
        </div>

        <div class="card">
            <div id="statusBadge" class="status-badge">
                <div class="status-dot"></div>
                <span id="statusText">System Gotowy</span>
            </div>

            <button id="startBtn" class="btn">Uruchom System</button>
            <button id="stopBtn" class="btn">Zatrzymaj Sensor</button>
        </div>

        <div class="footer">
            <center><a id="permBtn" class="perm-link" href="#">🔓 Kalibracja Kamery</a></center>
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>

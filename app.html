<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Sensor - Side Panel</title>
    <style>
        body {
            margin: 0;
            padding: 12px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100vh;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #1e293b;
            padding-bottom: 8px;
        }

        h2 {
            font-size: 1.1rem;
            margin: 0;
            color: #38bdf8;
        }

        #alertBox {
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            text-align: center;
        }

        .video-container {
            position: relative;
            width: 100%;
            background: black;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 4 / 3;
            border: 2px solid #1e293b;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .status-badge {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #startBtn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
        }

        #stopBtn {
            background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
            color: white;
            display: none;
            box-shadow: 0 4px 14px rgba(244, 63, 94, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: #1e293b;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .label {
            color: #94a3b8;
        }

        .val {
            color: white;
            font-weight: bold;
            font-size: 1rem;
        }

        .slider-box {
            background: #1e293b;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        input[type="range"] {
            width: 100%;
            margin-top: 8px;
            accent-color: #38bdf8;
        }
    </style>
</head>

<body>
    <div class="header">
        <h2>🎮 SENSOR V3 (SIDE PANEL)</h2>
    </div>

    <div id="alertBox">Kliknij przycisk poniżej</div>

    <div class="video-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <div id="statusBadge" class="status-badge">OTOCZENIE: OK</div>

    <div class="btn-container">
        <button id="startBtn">▶ URUCHOM SENSOR</button>
        <button id="stopBtn">⏹ ZATRZYMAJ</button>
    </div>

    <div class="stats-grid">
        <div class="stat-item">
            <span class="label">PŁYNNOŚĆ:</span>
            <span id="fpsStat" class="val">0 FPS</span>
        </div>
        <div class="stat-item">
            <span class="label">POZYCJA:</span>
            <span id="detectStat" class="val">Brak</span>
        </div>
    </div>

    <div class="slider-box">
        <label>CZUŁOŚĆ: <span id="sensVal" style="color:#38bdf8">15</span></label>
        <input type="range" id="sensSlider" min="5" max="50" step="1" value="15">
    </div>

    <script src="app.js" type="module"></script>
</body>

</html>
